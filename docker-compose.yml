services:
  postgres:
    image: postgres:15-alpine
    container_name: mediarch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mediarch_password_2024
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - E:/MediArch-Data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediarch-network

  mongodb:
    image: mongo:7.0
    container_name: mediarch-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mediarch2024
      MONGO_INITDB_DATABASE: mediarch
    volumes:
      - E:/MediArch-Data/mongodb:/data/db
      - E:/MediArch-Data/mongodb_config:/data/configdb
    networks:
      - mediarch-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: mediarch-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - E:/MediArch-Data/etcd:/etcd
    command: >
      etcd -advertise-client-urls=http://127.0.0.1:2379
           -listen-client-urls http://0.0.0.0:2379
           --data-dir /etcd
    networks:
      - mediarch-network

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: mediarch-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: "off"
    volumes:
      - E:/MediArch-Data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mediarch-network

  milvus:
    image: milvusdb/milvus:v2.6.2
    container_name: mediarch-milvus
    restart: unless-stopped
    depends_on:
      - etcd
      - minio
    environment:
      MILVUS_DEPLOY_MODE: standalone
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DATA_COORD_SEGMENT_MAX_SIZE: "512"
      LOG_LEVEL: info
    volumes:
      - E:/MediArch-Data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: ["milvus", "run", "standalone"]
    networks:
      - mediarch-network

  neo4j:
    image: neo4j:5.13-community
    container_name: mediarch-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/mediarch2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - E:/MediArch-Data/neo4j:/data
      - E:/MediArch-Data/neo4j_logs:/logs
    networks:
      - mediarch-network

networks:
  mediarch-network:
    driver: bridge